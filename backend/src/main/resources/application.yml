spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:psycare;DB_CLOSE_DELAY=-1}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1hbmQtc3VmaWNpZW50bHktbG9uZy1zZWNyZXQta2V5LXN1aXRBQkxFLWZvci1obWFjLXNoYTI1Ng==}
    expiration-ms: 86400000 # 24 Hours

server:
  port: ${PORT:8080}
  error:
    include-message: always
